name: CI

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src tests

      - name: Test
        run: |
          coverage run -m pytest
          coverage report
          for module in \
            src/demofml/data/ticks.py \
            src/demofml/bars/quotes.py \
            src/demofml/features/causal.py \
            src/demofml/labels/executable.py \
            src/demofml/validation/splits.py \
            src/demofml/models/baseline.py \
            src/demofml/models/frozen.py \
            src/demofml/models/locked.py \
            src/demofml/evaluation/signals.py \
            src/demofml/evaluation/portfolio.py; do
            coverage report --include="$module" --fail-under=90
          done

  container:
    name: Container smoke test
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build image
        run: docker build --target runtime --tag demofml:ci .

      - name: Run image
        run: test "$(docker run --rm demofml:ci)" = "demofml 0.1.0"
