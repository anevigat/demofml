name: Publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: anevigat/demofml

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build, scan, and publish
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build scan candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime
          load: true
          pull: true
          tags: demofml:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: demofml:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Build MLflow scan candidate
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: mlflow
          load: true
          pull: true
          tags: demofml:mlflow-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan MLflow image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: demofml:mlflow-scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          flavor: latest=false

      - name: Generate MLflow image metadata
        id: mlflow_metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=mlflow-main,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern=mlflow-{{version}}
            type=semver,pattern=mlflow-{{major}}.{{minor}}
            type=sha,prefix=mlflow-sha-
          flavor: latest=false

      - name: Publish multi-platform image
        id: publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Publish multi-platform MLflow image
        id: publish_mlflow
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: mlflow
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.mlflow_metadata.outputs.tags }}
          labels: ${{ steps.mlflow_metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Record immutable image reference
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
          MLFLOW_DIGEST: ${{ steps.publish_mlflow.outputs.digest }}
        run: |
          echo "${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_STEP_SUMMARY"
          echo "${IMAGE_NAME}@${MLFLOW_DIGEST}" >> "$GITHUB_STEP_SUMMARY"
