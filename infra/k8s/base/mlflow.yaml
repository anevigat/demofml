apiVersion: v1
kind: Service
metadata:
  name: mlflow
  labels:
    app.kubernetes.io/name: mlflow
spec:
  selector:
    app.kubernetes.io/name: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app.kubernetes.io/name: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
    spec:
      serviceAccountName: demofml-workload
      automountServiceAccountToken: false
      nodeSelector:
        intechsol.com/workload: demofml
      tolerations:
        - key: intechsol.com/workload
          operator: Equal
          value: demofml
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mlflow
          image: anevigat/demofml@sha256:d373f20d00cce05e509c9050443179b5721a66dc02be71eb3c55d00481e56906
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --workers
            - "2"
            - --backend-store-uri
            - $(MLFLOW_BACKEND_STORE_URI)
            - --serve-artifacts
            - --artifacts-destination
            - s3://demofml-artifacts/mlflow
            - --allowed-hosts
            - mlflow,mlflow:5000,mlflow.demofml.svc,mlflow.demofml.svc:5000,localhost,localhost:*,127.0.0.1,127.0.0.1:*
          envFrom:
            - configMapRef:
                name: demofml-runtime
          env:
            - name: MLFLOW_BACKEND_STORE_URI
              valueFrom:
                secretKeyRef:
                  name: demofml-services
                  key: MLFLOW_BACKEND_STORE_URI
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: demofml-services
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: demofml-services
                  key: AWS_SECRET_ACCESS_KEY
          ports:
            - name: http
              containerPort: 5000
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
