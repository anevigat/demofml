apiVersion: batch/v1
kind: Job
metadata:
  name: demofml-infrastructure-smoke
  namespace: demofml
  labels:
    app.kubernetes.io/name: infrastructure-smoke
    app.kubernetes.io/part-of: demofml
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 300
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infrastructure-smoke
        app.kubernetes.io/part-of: demofml
    spec:
      restartPolicy: Never
      serviceAccountName: demofml-workload
      automountServiceAccountToken: false
      nodeSelector:
        intechsol.com/workload: demofml
      tolerations:
        - key: intechsol.com/workload
          operator: Equal
          value: demofml
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: smoke
          image: anevigat/demofml@sha256:73200be495a190a539458b14ecbd3922b9a86f4e492d4670349031205fbad5f0
          imagePullPolicy: IfNotPresent
          args: [smoke-infra]
          envFrom:
            - configMapRef:
                name: demofml-runtime
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: demofml-services
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: demofml-services
                  key: AWS_SECRET_ACCESS_KEY
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
